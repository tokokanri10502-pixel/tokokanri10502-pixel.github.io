<!DOCTYPE html>
<html lang="ja">
<head>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W4EKTRW9RX"></script>
  <script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>TOKO WORKS — 社会派 DEEP Lab</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#7C3AED">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Meiryo', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      padding: 60px 24px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header::before {
      content: '';
      position: absolute;
      top: -80px; left: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(229,57,53,0.1);
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -60px; right: -40px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: rgba(33,150,243,0.08);
    }
    .header-label {
      display: inline-block;
      background: #e53935;
      color: #fff;
      font-size: 0.72rem;
      font-weight: bold;
      letter-spacing: 0.18em;
      padding: 4px 16px;
      border-radius: 2px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }
    .header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
      margin-bottom: 12px;
    }
    .header h1 span { color: #e53935; }
    .header-sub {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      position: relative;
      z-index: 1;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }
    .category-label {
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #e53935;
      margin-bottom: 16px;
      padding-left: 12px;
      border-left: 3px solid #e53935;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 22px 20px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }
    .card.has-image { padding: 0; }
    .card.has-image .card-body {
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }
    .card-image {
      width: 100%;
      aspect-ratio: 3 / 2;
      object-fit: cover;
      display: block;
      background: #0f0f1a;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(229,57,53,0.5);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .card.has-image:hover .card-image { opacity: 0.92; transition: opacity 0.15s; }
    .card-icon { font-size: 1.6rem; line-height: 1; }
    .card-title { font-size: 1rem; font-weight: 800; color: #fff; line-height: 1.35; }
    .card-desc { font-size: 0.82rem; color: rgba(255,255,255,0.5); line-height: 1.6; flex: 1; }
    .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 12px; }
    .card-date { font-size: 0.74rem; color: rgba(255,255,255,0.6); font-weight: 600; letter-spacing: 0.04em; }
    .card-tag { font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; letter-spacing: 0.04em; }
    .card-tag.study { background: rgba(229,57,53,0.2); color: #ef9a9a; }
    .card-tag.app   { background: rgba(33,150,243,0.2); color: #90caf9; }
    .card-icon-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-source {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.03em;
      line-height: 1.2;
    }
    .card-tag.life  { background: rgba(76,175,80,0.2); color: #a5d6a7; }
    .card-tag.disclaimer {
      background: transparent;
      color: rgba(255,255,255,0.35);
      font-weight: normal;
      padding: 2px 0;
      letter-spacing: 0.02em;
      font-size: 0.66rem;
    }
    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      padding: 24px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .search-wrap {
      display: flex;
      justify-content: center;
      margin-top: 28px;
      position: relative;
      z-index: 1;
    }
    .search-input {
      width: 100%;
      max-width: 420px;
      padding: 12px 48px 12px 18px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.3); }
    .search-input:focus { border-color: rgba(229,57,53,0.6); }
    .search-btn {
      position: absolute;
      right: calc(50% - 210px + 4px);
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    .search-btn:hover { color: #e53935; }
    .search-results-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .no-results {
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
      padding: 20px 0;
    }
  </style>
</head>
<body>
<div class="header">
  <div class="header-label">TOKO WORKS</div>
  <h1>社会派 <span>DEEP Lab</span></h1>
  <p class="header-sub">社会の深層をデータと言葉で読み解き、丁寧に解説します。</p>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="search" name="article-search-no-store" placeholder="記事を検索..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="search-btn" id="searchBtn" type="button">🔍</button>
  </div>
</div>
<div class="container">
  <!-- 記事一覧はすべて articles.js から自動生成されます。
       記事を追加するときは articles.js を編集してください。 -->
  <div id="cards-root"></div>
</div>
<div id="searchResultsSection" style="display:none;">
  <div class="container" style="padding-bottom: 0;">
    <p class="search-results-label" id="searchResultsLabel"></p>
    <div class="cards" id="searchResultsCards"></div>
    <p class="no-results" id="noResults" style="display:none;">該当する記事が見つかりませんでした</p>
  </div>
</div>
<div class="footer">
  © 2026 TOKO WORKS — 社会派 DEEP Lab
</div>
<script>document.write('<scr'+'ipt src="./articles.js?v=' + Math.floor(Date.now()/60000) + '"><\/scr'+'ipt>');</script>
<script>
  // ===== 記事カード自動描画 =====
  // window.ARTICLES を読み取り、.container 内にカテゴリとカードを生成する
  function renderArticles() {
    const root = document.getElementById('cards-root');
    if (!root || !window.ARTICLES) return;

    root.innerHTML = '';
    window.ARTICLES.categories.forEach(cat => {
      const label = document.createElement('div');
      label.className = 'category-label';
      label.textContent = cat.label;
      root.appendChild(label);

      const cards = document.createElement('div');
      cards.className = 'cards';
      // 日付降順（新しいものを左＝先頭）に並び替え。date は "YYYY.MM.DD" 文字列なので辞書順比較でOK
      const sorted = cat.articles.slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      sorted.forEach(art => {
        const a = document.createElement('a');
        a.className = art.image ? 'card has-image' : 'card';
        a.href = art.url;
        a.target = '_blank';

        const altText = (art.title || '').replace(/<br\s*\/?>/gi, ' ').replace(/<[^>]+>/g, '');
        const imageBlock = art.image
          ? `<img class="card-image" src="${art.image}" alt="${altText}" loading="lazy">`
          : '';

        let iconBlock;
        if (art.image) {
          iconBlock = (cat.showSource && art.source)
            ? `<div class="card-source">${art.source}</div>`
            : '';
        } else {
          iconBlock = (cat.showSource && art.source)
            ? `<div class="card-icon-row">
                 <div class="card-icon">${art.icon}</div>
                 <div class="card-source">${art.source}</div>
               </div>`
            : `<div class="card-icon">${art.icon}</div>`;
        }

        const tagLabel = art.tagLabel || '勉強会資料';
        const tagClass = tagLabel.startsWith('※') ? 'disclaimer' : (art.tag || 'study');

        const descBlock = art.image ? '' : `<div class="card-desc">${art.desc}</div>`;
        const inner = `
          ${iconBlock}
          <div class="card-title">${art.title}</div>
          ${descBlock}
          <div class="card-meta">
            <span class="card-date">${art.date}</span>
            <span class="card-tag ${tagClass}">${tagLabel}</span>
          </div>`;

        a.innerHTML = art.image
          ? `${imageBlock}<div class="card-body">${inner}</div>`
          : inner;
        cards.appendChild(a);
      });
      root.appendChild(cards);
    });
  }

  // ===== 検索 =====
  // 都度カードを querySelectorAll で取得する（動的生成のため）
  function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    const section = document.getElementById('searchResultsSection');
    const resultsCards = document.getElementById('searchResultsCards');
    const noResults = document.getElementById('noResults');
    const label = document.getElementById('searchResultsLabel');

    if (!q) {
      section.style.display = 'none';
      return;
    }

    const allCards = Array.from(document.querySelectorAll('#cards-root .card'));
    const matched = allCards.filter(card => {
      const title = card.querySelector('.card-title').textContent;
      return title.includes(q);
    });

    resultsCards.innerHTML = '';
    if (matched.length === 0) {
      noResults.style.display = 'block';
      label.textContent = `「${q}」の検索結果：0件`;
    } else {
      noResults.style.display = 'none';
      label.textContent = `「${q}」の検索結果：${matched.length}件`;
      matched.forEach(card => resultsCards.appendChild(card.cloneNode(true)));
    }
    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth' });
  }

  // ===== 初期化 =====
  document.addEventListener('DOMContentLoaded', () => {
    renderArticles();
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  });
</script>
</body>
</html>

<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="techGrad" x1="64" y1="0" x2="430" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="techGradV" x1="0" y1="128" x2="0" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="72" fill="#09091a"/>

  <!-- Circuit grid (very subtle) -->
  <g stroke="#7c3aed" stroke-width="0.8" opacity="0.07">
    <line x1="32"  y1="0" x2="32"  y2="512"/>
    <line x1="64"  y1="0" x2="64"  y2="512"/>
    <line x1="96"  y1="0" x2="96"  y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="224" y1="0" x2="224" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="288" y1="0" x2="288" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="352" y1="0" x2="352" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="416" y1="0" x2="416" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
    <line x1="480" y1="0" x2="480" y2="512"/>
    <line x1="0" y1="32"  x2="512" y2="32"/>
    <line x1="0" y1="64"  x2="512" y2="64"/>
    <line x1="0" y1="96"  x2="512" y2="96"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="224" x2="512" y2="224"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="288" x2="512" y2="288"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="352" x2="512" y2="352"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="416" x2="512" y2="416"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="0" y1="480" x2="512" y2="480"/>
  </g>

  <!-- Background circuit traces (decorative) -->
  <g stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.20">
    <polyline points="32,192 64,192 64,256 96,256"/>
    <polyline points="480,320 448,320 448,256 416,256"/>
    <polyline points="32,416 64,416 64,448 128,448"/>
    <polyline points="480,96 448,96 448,160 384,160"/>
  </g>
  <g fill="#7c3aed" opacity="0.22">
    <circle cx="64"  cy="192" r="3.5"/>
    <circle cx="64"  cy="256" r="3.5"/>
    <circle cx="96"  cy="256" r="3.5"/>
    <circle cx="448" cy="320" r="3.5"/>
    <circle cx="448" cy="256" r="3.5"/>
    <circle cx="416" cy="256" r="3.5"/>
  </g>

  <!-- ===== GLOW LAYER (blurred behind) ===== -->
  <g filter="url(#neon)" opacity="0.55">
    <!-- T bar -->
    <rect x="64" y="132" width="186" height="28" rx="3" fill="url(#techGrad)"/>
    <!-- T stem -->
    <rect x="140" y="160" width="28" height="222" rx="3" fill="url(#techGradV)"/>
    <!-- W -->
    <polyline
      points="250,132 294,382 334,230 374,382 418,132"
      fill="none"
      stroke="url(#techGrad)"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- ===== SHARP LAYER ===== -->
  <!-- T bar -->
  <rect x="64" y="132" width="186" height="28" rx="3" fill="url(#techGrad)"/>
  <!-- T stem -->
  <rect x="140" y="160" width="28" height="222" rx="3" fill="url(#techGradV)"/>
  <!-- W -->
  <polyline
    points="250,132 294,382 334,230 374,382 418,132"
    fill="none"
    stroke="url(#techGrad)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- ===== NODES ===== -->
  <g filter="url(#nodeGlow)">
    <!-- T nodes -->
    <circle cx="64"  cy="146" r="11" fill="url(#techGrad)"/>
    <circle cx="250" cy="146" r="11" fill="url(#techGrad)"/>
    <circle cx="154" cy="382" r="11" fill="url(#techGradV)"/>
    <!-- T bar/stem junction marks -->
    <circle cx="140" cy="146" r="6"  fill="url(#techGrad)"/>
    <circle cx="168" cy="146" r="6"  fill="url(#techGrad)"/>

    <!-- W nodes -->
    <circle cx="250" cy="132" r="11" fill="url(#techGrad)"/>
    <circle cx="294" cy="382" r="11" fill="url(#techGrad)"/>
    <circle cx="334" cy="230" r="11" fill="url(#techGrad)"/>
    <circle cx="374" cy="382" r="11" fill="url(#techGrad)"/>
    <circle cx="418" cy="132" r="11" fill="url(#techGrad)"/>
  </g>

  <!-- Node highlight (white center dot) -->
  <g fill="white" opacity="0.45">
    <circle cx="64"  cy="146" r="3.5"/>
    <circle cx="250" cy="146" r="3.5"/>
    <circle cx="154" cy="382" r="3.5"/>
    <circle cx="250" cy="132" r="3.5"/>
    <circle cx="294" cy="382" r="3.5"/>
    <circle cx="334" cy="230" r="3.5"/>
    <circle cx="374" cy="382" r="3.5"/>
    <circle cx="418" cy="132" r="3.5"/>
  </g>

  <!-- Border -->
  <rect width="512" height="512" rx="72" fill="none" stroke="#1a1040" stroke-width="3"/>
</svg>
